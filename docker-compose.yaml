services:
  lndg:
    build: .
    volumes:
      - /home/admin/.lnd:/root/.lnd:ro
      - /home/admin/data:/app/data:rw
    command:
      - sh
      - -c
      - python initialize.py -net 'mainnet' -rpc '127.0.0.1:10009' -wn && python controller.py runserver 0.0.0.0:8889 > /var/log/lndg-controller.log 2>&1
    network_mode: "host"
